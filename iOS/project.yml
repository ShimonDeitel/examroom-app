name: Examroom
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Examroom:
    type: application
    platform: iOS
    sources:
      - path: Examroom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.examroom
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Examroom
    info:
      path: Examroom/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
  ExamroomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ExamroomTests
    dependencies:
      - target: Examroom
  ExamroomUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ExamroomUITests
    dependencies:
      - target: Examroom
schemes:
  Examroom:
    build:
      targets:
        Examroom: all
    test:
      targets:
        - ExamroomTests
        - ExamroomUITests
